<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mastermind</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --text-muted: #888;
    --peg-size: 48px;
    --hint-size: 16px;
    --gap: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .header-info span {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .header-info .score-label {
    font-size: 0.85rem;
    color: var(--text);
    font-weight: 600;
  }

  /* ── Main layout ── */
  main {
    width: 100%;
    max-width: 480px;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  /* ── Board ── */
  #board {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: var(--gap);
    padding: 6px 10px;
    background: var(--surface);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .row.active-row {
    background: var(--surface2);
    box-shadow: 0 0 0 2px var(--accent);
  }

  .row-num {
    width: 20px;
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .pegs {
    display: flex;
    gap: var(--gap);
    flex: 1;
    justify-content: center;
  }

  .peg {
    width: var(--peg-size);
    height: var(--peg-size);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    cursor: pointer;
    background: #2a2a4a;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    flex-shrink: 0;
  }

  .peg:active { transform: scale(0.92); }

  .peg.filled {
    border-color: rgba(255,255,255,0.3);
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }

  .peg.selected-for-edit {
    box-shadow: 0 0 0 3px white, inset 0 -3px 6px rgba(0,0,0,0.4);
  }

  /* hint grid */
  .hints {
    display: grid;
    grid-template-columns: repeat(2, var(--hint-size));
    grid-template-rows: repeat(2, var(--hint-size));
    gap: 3px;
    flex-shrink: 0;
  }

  .hint-peg {
    width: var(--hint-size);
    height: var(--hint-size);
    border-radius: 50%;
    background: #2a2a4a;
    border: 1.5px solid rgba(255,255,255,0.1);
  }

  .hint-peg.black { background: #222; border-color: rgba(255,255,255,0.4); }
  .hint-peg.white { background: #f0f0f0; border-color: rgba(0,0,0,0.2); }

  /* ── Color palette ── */
  #palette-section {
    width: 100%;
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
  }

  #palette-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-align: center;
  }

  #palette {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .color-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.35), 0 3px 8px rgba(0,0,0,0.3);
    position: relative;
    flex-shrink: 0;
  }

  .color-btn:active { transform: scale(0.90); }
  .color-btn.active-color { border-color: white; transform: scale(1.08); }

  /* ── Submit area ── */
  #action-section {
    width: 100%;
    display: flex;
    gap: 10px;
  }

  button.action-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    letter-spacing: 0.5px;
  }

  button.action-btn:active { transform: scale(0.96); }
  button.action-btn:disabled { opacity: 0.35; cursor: default; }

  #submit-btn { background: var(--accent); color: white; }
  #clear-btn  { background: var(--surface2); color: var(--text); }

  /* ── Secret code display ── */
  #secret-reveal {
    width: 100%;
    background: var(--surface);
    border-radius: 12px;
    padding: 12px 16px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-direction: column;
  }

  #secret-reveal h3 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  #secret-pegs {
    display: flex;
    gap: 10px;
  }

  .secret-peg {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }

  /* ── Result banner ── */
  #result-banner {
    width: 100%;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  #result-banner.win  { background: #1a3a1a; border: 1.5px solid #4caf50; }
  #result-banner.lose { background: #3a1a1a; border: 1.5px solid #e94560; }

  #result-banner h2 { font-size: 1.4rem; }
  #result-banner p  { font-size: 0.9rem; color: var(--text-muted); }

  #new-game-btn {
    margin-top: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    align-self: center;
    transition: transform 0.1s;
  }
  #new-game-btn:active { transform: scale(0.96); }

  /* ── Settings modal ── */
  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #settings-overlay.open { display: flex; }

  #settings-panel {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  #settings-panel h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .setting-row label { font-size: 0.95rem; }

  .setting-row .seg-ctrl {
    display: flex;
    gap: 4px;
  }

  .seg-btn {
    padding: 6px 12px;
    border: 1.5px solid var(--surface2);
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.1s;
  }

  .seg-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--accent);
  }

  .toggle-switch {
    position: relative;
    width: 48px;
    height: 26px;
    flex-shrink: 0;
  }

  .toggle-switch input { opacity: 0; width: 0; height: 0; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #444;
    border-radius: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-track::before {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: white;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-switch input:checked + .toggle-track::before { transform: translateX(22px); }

  .settings-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .settings-actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .settings-actions button:active { transform: scale(0.96); }
  #settings-cancel { background: var(--surface2); color: var(--text); }
  #settings-apply  { background: var(--accent);   color: white; }

  /* ── Score strip ── */
  #score-strip {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 6px 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  #score-strip span strong { color: var(--text); }

  /* ── Gear icon ── */
  .gear-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    font-size: 1.3rem;
    line-height: 1;
    transition: color 0.15s;
  }
  .gear-btn:hover { color: var(--text); }

  /* ── Pass-and-play code entry ── */
  #code-entry-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
  }

  #code-entry-overlay.open { display: flex; }

  #code-entry-overlay h2 {
    font-size: 1.2rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #code-entry-overlay p {
    color: var(--text-muted);
    font-size: 0.9rem;
    text-align: center;
  }

  #code-entry-pegs {
    display: flex;
    gap: 12px;
  }

  #code-entry-pegs .peg {
    width: 60px;
    height: 60px;
  }

  #code-entry-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 320px;
  }

  #code-entry-palette .color-btn {
    width: 60px;
    height: 60px;
  }

  #start-game-btn {
    padding: 14px 36px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #start-game-btn:disabled { opacity: 0.35; cursor: default; }
  #start-game-btn:active { transform: scale(0.96); }

  /* ── Landscape tweaks ── */
  @media (max-height: 500px) and (orientation: landscape) {
    :root {
      --peg-size: 36px;
      --hint-size: 13px;
    }

    header { padding: 6px 12px 4px; }
    header h1 { font-size: 1.1rem; }
    main { gap: 6px; }
    .row { padding: 4px 8px; }
    #board { gap: 4px; }
    #palette-section { padding: 8px; }
    #palette-section h3 { margin-bottom: 6px; }
    .color-btn { width: 44px; height: 44px; }
    button.action-btn { padding: 10px; font-size: 0.9rem; }
    #score-strip { padding: 2px 16px; }
  }

  /* Very small screens */
  @media (max-width: 340px) {
    :root { --peg-size: 40px; }
    .color-btn { width: 44px; height: 44px; }
  }
</style>
</head>
<body>

<header>
  <h1>Mastermind</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="header-info">
      <span id="guess-counter">Guess 1 / 10</span>
      <span id="mode-label" class="score-label">Auto Code</span>
    </div>
    <button class="gear-btn" id="settings-btn" title="Settings">⚙</button>
  </div>
</header>

<div id="score-strip">
  <span>Wins: <strong id="wins-count">0</strong></span>
  <span>Losses: <strong id="losses-count">0</strong></span>
  <span>Best: <strong id="best-count">—</strong></span>
</div>

<main>
  <div id="board"></div>

  <div id="result-banner">
    <h2 id="result-title"></h2>
    <p id="result-msg"></p>
    <button id="new-game-btn">New Game</button>
  </div>

  <div id="secret-reveal">
    <h3>The Secret Code Was</h3>
    <div id="secret-pegs"></div>
  </div>

  <div id="palette-section">
    <h3>Tap a color, then tap a peg slot</h3>
    <div id="palette"></div>
  </div>

  <div id="action-section">
    <button class="action-btn" id="clear-btn">Clear Row</button>
    <button class="action-btn" id="submit-btn" disabled>Submit Guess</button>
  </div>
</main>

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="setting-row">
      <label>Pegs</label>
      <div class="seg-ctrl" id="pegs-ctrl">
        <button class="seg-btn" data-val="3">3</button>
        <button class="seg-btn active" data-val="4">4</button>
        <button class="seg-btn" data-val="5">5</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Colors</label>
      <div class="seg-ctrl" id="colors-ctrl">
        <button class="seg-btn" data-val="4">4</button>
        <button class="seg-btn active" data-val="6">6</button>
        <button class="seg-btn" data-val="8">8</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Max Guesses</label>
      <div class="seg-ctrl" id="guesses-ctrl">
        <button class="seg-btn" data-val="6">6</button>
        <button class="seg-btn active" data-val="10">10</button>
        <button class="seg-btn" data-val="12">12</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Allow Duplicates</label>
      <label class="toggle-switch">
        <input type="checkbox" id="duplicates-toggle" checked>
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="setting-row">
      <label>Pass-and-Play</label>
      <label class="toggle-switch">
        <input type="checkbox" id="passplay-toggle">
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="settings-actions">
      <button id="settings-cancel">Cancel</button>
      <button id="settings-apply">Apply & New Game</button>
    </div>
  </div>
</div>

<!-- Pass-and-Play Code Entry -->
<div id="code-entry-overlay">
  <h2>Set the Secret Code</h2>
  <p>Code-setter: choose <span id="code-peg-count">4</span> colors.<br>Then hand the phone to the guesser.</p>
  <div id="code-entry-pegs"></div>
  <div id="code-entry-palette"></div>
  <button id="start-game-btn" disabled>Start Game →</button>
</div>

<script>
(function() {
  'use strict';

  // ── Color definitions ──────────────────────────────────────────────
  const ALL_COLORS = [
    { id: 'red',    hex: '#e63946' },
    { id: 'orange', hex: '#f4a261' },
    { id: 'yellow', hex: '#e9c46a' },
    { id: 'green',  hex: '#57cc99' },
    { id: 'blue',   hex: '#4361ee' },
    { id: 'purple', hex: '#9b5de5' },
    { id: 'pink',   hex: '#f72585' },
    { id: 'teal',   hex: '#2ec4b6' },
  ];

  // ── State ──────────────────────────────────────────────────────────
  let config = loadConfig();
  let game   = null;
  let score  = loadScore();

  // Palette UI state
  let selectedColor = null;
  let selectedPegIndex = null;

  // ── Config persistence ─────────────────────────────────────────────
  function loadConfig() {
    try {
      const c = JSON.parse(localStorage.getItem('mm_config') || '{}');
      return {
        pegs:       c.pegs       || 4,
        colors:     c.colors     || 6,
        maxGuesses: c.maxGuesses || 10,
        duplicates: c.duplicates !== false,
        passPlay:   c.passPlay   || false,
      };
    } catch { return { pegs: 4, colors: 6, maxGuesses: 10, duplicates: true, passPlay: false }; }
  }

  function saveConfig() {
    localStorage.setItem('mm_config', JSON.stringify(config));
  }

  function loadScore() {
    try {
      const s = JSON.parse(localStorage.getItem('mm_score') || '{}');
      return { wins: s.wins || 0, losses: s.losses || 0, best: s.best || null };
    } catch { return { wins: 0, losses: 0, best: null }; }
  }

  function saveScore() {
    localStorage.setItem('mm_score', JSON.stringify(score));
  }

  // ── Game logic ─────────────────────────────────────────────────────
  function generateCode() {
    const pool = ALL_COLORS.slice(0, config.colors);
    const code = [];
    if (config.duplicates) {
      for (let i = 0; i < config.pegs; i++) {
        code.push(pool[Math.floor(Math.random() * pool.length)].id);
      }
    } else {
      const shuffled = pool.slice().sort(() => Math.random() - 0.5);
      for (let i = 0; i < config.pegs; i++) code.push(shuffled[i].id);
    }
    return code;
  }

  function calcFeedback(secret, guess) {
    let blacks = 0, whites = 0;
    const sCopy = secret.slice();
    const gCopy = guess.slice();

    // Black pegs first
    for (let i = 0; i < sCopy.length; i++) {
      if (gCopy[i] === sCopy[i]) { blacks++; sCopy[i] = null; gCopy[i] = null; }
    }
    // White pegs
    for (let i = 0; i < gCopy.length; i++) {
      if (gCopy[i] === null) continue;
      const j = sCopy.indexOf(gCopy[i]);
      if (j !== -1) { whites++; sCopy[j] = null; }
    }
    return { blacks, whites };
  }

  function newGame(secretCode) {
    game = {
      secret:  secretCode,
      rows:    Array.from({ length: config.maxGuesses }, () => Array(config.pegs).fill(null)),
      feedback: Array(config.maxGuesses).fill(null),
      current: 0,
      over:    false,
      won:     false,
    };
    selectedColor    = null;
    selectedPegIndex = null;
    renderBoard();
    renderPalette();
    updateControls();
    updateGuessCounter();
    hideResultBanner();
    hideSecretReveal();
  }

  // ── Rendering ──────────────────────────────────────────────────────
  function colorHex(id) {
    return (ALL_COLORS.find(c => c.id === id) || {}).hex || '#2a2a4a';
  }

  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    for (let r = config.maxGuesses - 1; r >= 0; r--) {
      const row = document.createElement('div');
      row.className = 'row' + (r === game.current && !game.over ? ' active-row' : '');
      row.dataset.row = r;

      const numEl = document.createElement('div');
      numEl.className = 'row-num';
      numEl.textContent = r + 1;
      row.appendChild(numEl);

      const pegs = document.createElement('div');
      pegs.className = 'pegs';
      for (let p = 0; p < config.pegs; p++) {
        const peg = document.createElement('div');
        peg.className = 'peg';
        const color = game.rows[r][p];
        if (color) {
          peg.style.background = colorHex(color);
          peg.classList.add('filled');
        }
        if (r === game.current && !game.over) {
          if (p === selectedPegIndex) peg.classList.add('selected-for-edit');
          peg.addEventListener('click', () => onPegClick(p));
        }
        pegs.appendChild(peg);
      }
      row.appendChild(pegs);

      const hints = document.createElement('div');
      hints.className = 'hints';
      const fb = game.feedback[r];
      const total = config.pegs;
      const hintOrder = fb ? buildHintOrder(fb.blacks, fb.whites, total) : Array(total).fill('empty');
      for (let h = 0; h < total; h++) {
        const hp = document.createElement('div');
        hp.className = 'hint-peg ' + (hintOrder[h] || 'empty');
        hints.appendChild(hp);
      }
      row.appendChild(hints);

      board.appendChild(row);
    }
  }

  function buildHintOrder(blacks, whites, total) {
    const arr = [];
    for (let i = 0; i < blacks; i++) arr.push('black');
    for (let i = 0; i < whites; i++) arr.push('white');
    while (arr.length < total) arr.push('empty');
    return arr;
  }

  function renderPalette() {
    const palette = document.getElementById('palette');
    palette.innerHTML = '';
    for (let i = 0; i < config.colors; i++) {
      const c = ALL_COLORS[i];
      const btn = document.createElement('button');
      btn.className = 'color-btn' + (selectedColor === c.id ? ' active-color' : '');
      btn.style.background = c.hex;
      btn.title = c.id;
      btn.addEventListener('click', () => onColorSelect(c.id));
      palette.appendChild(btn);
    }
  }

  function updateControls() {
    if (!game) return;
    const row = game.rows[game.current];
    const filled = row.filter(Boolean).length;
    document.getElementById('submit-btn').disabled = game.over || filled < config.pegs;
    document.getElementById('clear-btn').disabled  = game.over || filled === 0;
  }

  function updateGuessCounter() {
    if (!game) return;
    document.getElementById('guess-counter').textContent =
      game.over ? 'Game Over' : `Guess ${game.current + 1} / ${config.maxGuesses}`;
  }

  function updateScoreDisplay() {
    document.getElementById('wins-count').textContent   = score.wins;
    document.getElementById('losses-count').textContent = score.losses;
    document.getElementById('best-count').textContent   = score.best !== null ? score.best : '—';
  }

  function updateModeLabel() {
    document.getElementById('mode-label').textContent = config.passPlay ? 'Pass-and-Play' : 'Auto Code';
  }

  // ── Interaction ────────────────────────────────────────────────────
  function onColorSelect(colorId) {
    selectedColor = colorId;
    // If a peg slot was selected, fill it immediately
    if (selectedPegIndex !== null) {
      game.rows[game.current][selectedPegIndex] = colorId;
      // advance to next empty slot
      const nextEmpty = game.rows[game.current].indexOf(null);
      selectedPegIndex = nextEmpty;
      renderBoard();
      renderPalette();
      updateControls();
    } else {
      // Select first empty slot automatically
      const firstEmpty = game.rows[game.current].indexOf(null);
      if (firstEmpty !== -1) {
        game.rows[game.current][firstEmpty] = colorId;
        const nextEmpty = game.rows[game.current].indexOf(null);
        selectedPegIndex = nextEmpty;
        renderBoard();
        renderPalette();
        updateControls();
      } else {
        renderPalette();
      }
    }
  }

  function onPegClick(pegIndex) {
    if (game.over) return;
    if (selectedColor) {
      game.rows[game.current][pegIndex] = selectedColor;
      const nextEmpty = game.rows[game.current].indexOf(null);
      selectedPegIndex = nextEmpty !== -1 ? nextEmpty : pegIndex;
      renderBoard();
      updateControls();
    } else {
      selectedPegIndex = pegIndex;
      renderBoard();
    }
  }

  function submitGuess() {
    if (game.over) return;
    const row = game.rows[game.current];
    if (row.filter(Boolean).length < config.pegs) return;

    const fb = calcFeedback(game.secret, row);
    game.feedback[game.current] = fb;

    if (fb.blacks === config.pegs) {
      game.over = true;
      game.won  = true;
      score.wins++;
      const guessCount = game.current + 1;
      if (score.best === null || guessCount < score.best) score.best = guessCount;
      saveScore();
      updateScoreDisplay();
      renderBoard();
      showResultBanner(true, guessCount);
      showSecretReveal();
    } else if (game.current === config.maxGuesses - 1) {
      game.over = true;
      score.losses++;
      saveScore();
      updateScoreDisplay();
      renderBoard();
      showResultBanner(false, 0);
      showSecretReveal();
    } else {
      game.current++;
      selectedColor    = null;
      selectedPegIndex = null;
      renderBoard();
      updateControls();
      updateGuessCounter();
    }
  }

  function clearRow() {
    if (game.over) return;
    game.rows[game.current] = Array(config.pegs).fill(null);
    selectedPegIndex = null;
    renderBoard();
    updateControls();
  }

  // ── Result / reveal ────────────────────────────────────────────────
  function showResultBanner(won, guessCount) {
    const banner = document.getElementById('result-banner');
    const title  = document.getElementById('result-title');
    const msg    = document.getElementById('result-msg');
    banner.className = won ? 'win' : 'lose';
    if (won) {
      title.textContent = guessCount === 1 ? 'Perfect!' : (guessCount <= 4 ? 'Brilliant!' : 'You cracked it!');
      msg.textContent   = `Solved in ${guessCount} guess${guessCount === 1 ? '' : 'es'}`;
    } else {
      title.textContent = 'Out of Guesses!';
      msg.textContent   = 'Better luck next round!';
    }
    banner.style.display = 'flex';
    updateGuessCounter();
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('clear-btn').disabled  = true;
  }

  function hideResultBanner() {
    document.getElementById('result-banner').style.display = 'none';
  }

  function showSecretReveal() {
    const el = document.getElementById('secret-reveal');
    const pegs = document.getElementById('secret-pegs');
    pegs.innerHTML = '';
    game.secret.forEach(colorId => {
      const peg = document.createElement('div');
      peg.className = 'secret-peg';
      peg.style.background = colorHex(colorId);
      pegs.appendChild(peg);
    });
    el.style.display = 'flex';
  }

  function hideSecretReveal() {
    document.getElementById('secret-reveal').style.display = 'none';
  }

  // ── Settings ───────────────────────────────────────────────────────
  function openSettings() {
    syncSettingsUI();
    document.getElementById('settings-overlay').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settings-overlay').classList.remove('open');
  }

  function syncSettingsUI() {
    setSegActive('pegs-ctrl',    config.pegs);
    setSegActive('colors-ctrl',  config.colors);
    setSegActive('guesses-ctrl', config.maxGuesses);
    document.getElementById('duplicates-toggle').checked = config.duplicates;
    document.getElementById('passplay-toggle').checked   = config.passPlay;
  }

  function setSegActive(ctrlId, val) {
    const ctrl = document.getElementById(ctrlId);
    ctrl.querySelectorAll('.seg-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) === val);
    });
  }

  function getSegValue(ctrlId) {
    const active = document.querySelector(`#${ctrlId} .seg-btn.active`);
    return active ? parseInt(active.dataset.val) : null;
  }

  function applySettings() {
    config.pegs       = getSegValue('pegs-ctrl')    || config.pegs;
    config.colors     = getSegValue('colors-ctrl')  || config.colors;
    config.maxGuesses = getSegValue('guesses-ctrl') || config.maxGuesses;
    config.duplicates = document.getElementById('duplicates-toggle').checked;
    config.passPlay   = document.getElementById('passplay-toggle').checked;
    saveConfig();
    closeSettings();
    updateModeLabel();
    startNewRound();
  }

  // ── Pass-and-Play code entry ───────────────────────────────────────
  let codeEntrySelection = [];
  let codeEntrySelectedColor = null;

  function openCodeEntry() {
    codeEntrySelection = Array(config.pegs).fill(null);
    codeEntrySelectedColor = null;
    document.getElementById('code-peg-count').textContent = config.pegs;
    renderCodeEntryPegs();
    renderCodeEntryPalette();
    document.getElementById('start-game-btn').disabled = true;
    document.getElementById('code-entry-overlay').classList.add('open');
  }

  function closeCodeEntry() {
    document.getElementById('code-entry-overlay').classList.remove('open');
  }

  function renderCodeEntryPegs() {
    const container = document.getElementById('code-entry-pegs');
    container.innerHTML = '';
    for (let i = 0; i < config.pegs; i++) {
      const peg = document.createElement('div');
      peg.className = 'peg' + (codeEntrySelection[i] ? ' filled' : '');
      if (codeEntrySelection[i]) peg.style.background = colorHex(codeEntrySelection[i]);
      peg.addEventListener('click', () => {
        if (codeEntrySelectedColor) {
          codeEntrySelection[i] = codeEntrySelectedColor;
          renderCodeEntryPegs();
          checkCodeEntryReady();
        }
      });
      container.appendChild(peg);
    }
  }

  function renderCodeEntryPalette() {
    const container = document.getElementById('code-entry-palette');
    container.innerHTML = '';
    for (let i = 0; i < config.colors; i++) {
      const c = ALL_COLORS[i];
      const btn = document.createElement('button');
      btn.className = 'color-btn' + (codeEntrySelectedColor === c.id ? ' active-color' : '');
      btn.style.background = c.hex;
      btn.addEventListener('click', () => {
        codeEntrySelectedColor = c.id;
        // auto-fill next empty
        const nextEmpty = codeEntrySelection.indexOf(null);
        if (nextEmpty !== -1) {
          codeEntrySelection[nextEmpty] = c.id;
          renderCodeEntryPegs();
          checkCodeEntryReady();
        }
        renderCodeEntryPalette();
      });
      container.appendChild(btn);
    }
  }

  function checkCodeEntryReady() {
    const ready = codeEntrySelection.every(Boolean);
    document.getElementById('start-game-btn').disabled = !ready;
  }

  // ── New game flow ──────────────────────────────────────────────────
  function startNewRound() {
    if (config.passPlay) {
      openCodeEntry();
    } else {
      newGame(generateCode());
    }
  }

  // ── Segment control click delegation ──────────────────────────────
  function setupSegCtrl(ctrlId) {
    document.getElementById(ctrlId).addEventListener('click', e => {
      const btn = e.target.closest('.seg-btn');
      if (!btn) return;
      document.querySelectorAll(`#${ctrlId} .seg-btn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  }

  // ── Wiring ─────────────────────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', submitGuess);
  document.getElementById('clear-btn').addEventListener('click', clearRow);
  document.getElementById('new-game-btn').addEventListener('click', startNewRound);
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-cancel').addEventListener('click', closeSettings);
  document.getElementById('settings-apply').addEventListener('click', applySettings);

  document.getElementById('start-game-btn').addEventListener('click', () => {
    if (codeEntrySelection.every(Boolean)) {
      closeCodeEntry();
      newGame(codeEntrySelection.slice());
    }
  });

  // Close settings overlay on backdrop click
  document.getElementById('settings-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('settings-overlay')) closeSettings();
  });

  setupSegCtrl('pegs-ctrl');
  setupSegCtrl('colors-ctrl');
  setupSegCtrl('guesses-ctrl');

  // ── Boot ───────────────────────────────────────────────────────────
  updateModeLabel();
  updateScoreDisplay();
  startNewRound();

})();
</script>
</body>
</html>
